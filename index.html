<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">
       <title>Document</title>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <h1 class="logo">Website</h1>
            <ul class="nav-item">
                <li><a href="www.google.com">Home</a></li>
                <li><a href="">Todo</a></li>
                <li><a href="">Sign Up</a></li>

            </ul>
       
        </nav>
        <div class="headline">
            <h2>
                Manage your tasks   <span  style="display:none;">Hello</span>
            </h2>
            <button class="btn btn-headline">
                Learn More
            </button> </div>
         </header>
    
    <section class="section-todo container">
                <h2> Your plan for today ? </h2>

                <form action="" class="form-todo">
                    <input type="text" name="" id="" placeholder="add Todo">
                    <input type="submit" value="Add Todo" class="btn">
                </form>
                <ul class="todo-list">
                    <li >
                    <span class="text">Do this do that</span>
                     <div class="todo-buttons">
                        <button class="done todo-btn">Done</button>
                        <button class="remove todo-btn">Remove</button>
                    </div> 
                    </li>
                         
                    
                </ul>
            </section>

            <section class="section-signup container">
                <h2> Sign up</h2>

                <form action="" class="signup-form">
                    <div class="form-group">
                   <label for="username">UserName</label>
                   <input type="text" name="username" id="username">
                    </div>

                   <div class="form-group">
                   <label for="password">Password</label>
                   <input type="password" name="psb" id="password">
                    </div>

                     <div class="form-group">
                   <label for="confirm_password">Confirm Password</label>
                   <input type="password" name="confirm_psb" id="confirm_password">
                    </div>

                   <div class="form-group">
                   <label for="phone">Phone</label>
                   <input type="number" name="phone" id="phone">
                    </div>

                     <div class="form-group">
                   <label for="email">Email</label>
                   <input type="email" name="email" id="email">
                    </div>

                    <div class="form-group">
                   <label for="about">About Yourself</label>
                   <textarea  name="about" id="about" col="30" rows="10"></textarea>
                    </div>
                     <button class="btn signup-btn" type="submit">Submit</button>
                     </form> </section>
<script src="submit_event.js"></script>
 </body>
</html>
